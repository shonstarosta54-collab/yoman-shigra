/* committed dark design — identical tokens in every theme mode */
:root, :root[data-theme="light"], :root[data-theme="dark"]{
  --bg:#0C1014; --glow:#13241D; --card:#141A21; --ink:#E8EDF2; --muted:#8B95A1; --line:#232B35;
  --accent:#3DE8B0; --accent-ink:#052A1E; --accent-soft:#173028; --chip:#1B222B;
  --warn:#FF8A5C; --warn-soft:#33201A;
  --hero-a:#1A222B; --hero-b:#0D1116; --hero-ink:#EDF2F0; --hero-muted:rgba(237,242,240,.6);
  --hero-chip:rgba(255,255,255,.07); --hero-line:rgba(255,255,255,.12);
  --gold:#3DE8B0; --gold-over:#FF8A5C;
  --violet:#8B7CFF; --violet-soft:#241F3E;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.35);
  color-scheme:dark;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1100px 420px at 50% -120px, var(--glow), transparent), var(--bg);
  color:var(--ink);
  font-family:'Assistant',-apple-system,'Segoe UI',Arial,sans-serif;
  font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
#app{direction:rtl; max-width:660px; margin:0 auto; padding:14px 16px 80px}

button{font-family:inherit; font-size:1rem; cursor:pointer; border:none; background:none; color:inherit}
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px; border-radius:6px;
}
input,textarea,select{
  font-family:inherit; font-size:1rem; color:var(--ink);
  background:var(--card); border:1px solid var(--line); border-radius:11px; padding:9px 12px;
}
input::placeholder,textarea::placeholder{color:var(--muted)}

/* ---------- header ---------- */
header{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 0 12px; flex-wrap:wrap}
.brand{font-size:.8rem; font-weight:700; color:var(--muted); letter-spacing:.05em}
.day-nav{display:flex; align-items:center; gap:6px}
.nav-btn{
  width:38px; height:38px; border-radius:50%; background:var(--card); border:1px solid var(--line);
  display:grid; place-items:center; font-size:1.15rem; color:var(--muted); box-shadow:var(--shadow);
}
.nav-btn:hover{color:var(--accent)}
.today-chip{
  font-weight:700; font-size:.85rem; padding:7px 14px; border-radius:999px;
  background:var(--accent); color:var(--accent-ink);
}
.today-chip[disabled]{background:var(--chip); color:var(--muted); cursor:default}
.cal-wrap{position:relative; overflow:hidden; padding:0}
.cal-wrap input{
  position:absolute; inset:0; width:100%; height:100%;
  opacity:0; margin:0; padding:0; border:0; cursor:pointer;
  -webkit-appearance:none; appearance:none;
}

/* On phones, put the day switcher on its own row below the title, with bigger tap targets */
@media(max-width:560px){
  header{flex-direction:column; align-items:stretch; gap:10px}
  .brand{text-align:center}
  .day-nav{justify-content:center; gap:10px}
  .nav-btn{width:46px; height:46px; font-size:1.3rem}
  .today-chip{font-size:.95rem; padding:10px 20px}
}

/* ---------- hero ---------- */
.hero{
  background:
    radial-gradient(420px 220px at 18% 12%, rgba(61,232,176,.13), transparent 70%),
    radial-gradient(300px 180px at 90% 90%, rgba(139,124,255,.09), transparent 70%),
    linear-gradient(150deg, var(--hero-a), var(--hero-b));
  color:var(--hero-ink); border:1px solid var(--hero-line);
  border-radius:22px; padding:22px 22px 18px; margin-bottom:16px;
  box-shadow:0 12px 36px rgba(0,0,0,.45);
}
.hero-top{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}
.hero h1{
  font-family:'Frank Ruhl Libre',serif; font-weight:800; font-size:1.75rem; line-height:1.15;
  margin:0 0 4px; text-wrap:balance;
}
.hero .sub{color:var(--hero-muted); font-size:.9rem; margin:0 0 10px}
.ring-wrap{position:relative; width:138px; height:138px; flex-shrink:0}
.ring-wrap svg{width:138px; height:138px; transform:rotate(-90deg)}
.ring-bg{fill:none; stroke:var(--hero-chip); stroke-width:11}
.ring-fg{
  fill:none; stroke:var(--gold); stroke-width:11; stroke-linecap:round;
  transition:stroke-dashoffset .5s ease;
  filter:drop-shadow(0 0 7px rgba(61,232,176,.55));
}
.ring-fg.over{stroke:var(--gold-over); filter:drop-shadow(0 0 7px rgba(255,138,92,.55))}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.ring-num{
  font-family:'Frank Ruhl Libre',serif; font-weight:800; font-size:2rem; line-height:1;
  font-variant-numeric:tabular-nums;
}
.ring-label{font-size:.72rem; color:var(--hero-muted); margin-top:4px}
.hero-chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--hero-line)}
.hchip{
  background:var(--hero-chip); border-radius:999px; padding:6px 13px; font-size:.84rem; font-weight:600;
  display:flex; align-items:center; gap:6px; color:var(--hero-ink); border:none;
}
.hchip b{font-variant-numeric:tabular-nums; font-weight:700}
.hchip.warn-chip b{color:var(--gold-over)}
button.hchip{cursor:pointer}
button.hchip:hover{background:rgba(255,255,255,.22)}
.setup-cta{
  background:var(--gold); color:#052A1E; font-weight:700; border-radius:999px; padding:8px 18px; font-size:.9rem;
  box-shadow:0 2px 14px rgba(61,232,176,.35);
}

/* ---------- cards ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:18px 20px; margin-bottom:16px}
.card h2{
  font-family:'Frank Ruhl Libre',serif; font-weight:800; font-size:1.15rem; margin:0 0 12px;
  display:flex; align-items:center; gap:8px;
}
.card h2 .hint{
  font-family:'Assistant',sans-serif; font-weight:600; font-size:.76rem; color:var(--muted);
  margin-inline-start:auto; background:var(--chip); border-radius:999px; padding:3px 10px;
}

/* ---------- meals ---------- */
.meal-group{margin-bottom:14px}
.meal-group:last-child{margin-bottom:0}
.meal-head{display:flex; align-items:center; gap:8px; margin-bottom:6px}
.meal-name{font-weight:700; font-size:.95rem}
.meal-kcal{color:var(--muted); font-size:.85rem; font-variant-numeric:tabular-nums}
.meal-add{
  margin-inline-start:auto; border-radius:999px; padding:5px 13px;
  background:var(--accent-soft); color:var(--accent); font-size:.84rem; font-weight:700;
}
.meal-add:hover{background:var(--accent); color:var(--accent-ink)}
.entry{display:flex; align-items:center; gap:12px; padding:9px 0; border-top:1px solid var(--line)}
.entry-thumb{
  width:54px; height:54px; border-radius:12px; object-fit:cover; flex-shrink:0; cursor:zoom-in;
  background:var(--chip); border:1px solid var(--line);
}
.entry-thumb.placeholder{display:grid; place-items:center; font-size:1.3rem; cursor:default}
.entry-info{flex:1; min-width:0}
.entry-name{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.entry-desc{font-size:.8rem; color:var(--muted)}
.entry-kcal{font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap}
.entry-kcal small{font-weight:400; color:var(--muted)}
.entry-del{color:var(--muted); font-size:1.05rem; padding:6px}
.entry-del:hover{color:var(--warn)}
.empty-meal{color:var(--muted); font-size:.85rem; padding:4px 0; border-top:1px solid var(--line)}
.confirming{color:var(--warn) !important; font-weight:700}

/* ---------- workout ---------- */
.workout-today{
  background:var(--accent-soft); border-radius:16px; padding:14px 16px; margin-bottom:12px;
}
.workout-head{display:flex; align-items:center; gap:14px}
.workout-icon{font-size:1.7rem}
.workout-info{flex:1}
.workout-name{font-weight:700; font-size:1.02rem}
.ex-list{margin-top:10px; display:flex; flex-direction:column; gap:6px}
.ex-row{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  background:var(--card); border:1px solid var(--line); border-radius:10px; padding:7px 12px; font-size:.88rem;
}
.ex-row .ex-name{text-align:start}
.ex-row .ex-detail{color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap}
.ex-row.has-info{cursor:pointer}
.ex-row.has-info:hover{border-color:var(--accent)}
.info-dot{font-size:.72rem; opacity:.75}
.ex-explain{
  font-size:.82rem; color:var(--muted); line-height:1.5; text-align:start;
  background:var(--chip); border-radius:0 0 10px 10px; padding:8px 14px; margin-top:-6px;
}
.wp-arrow{margin-inline-start:auto; color:var(--muted); font-size:.8rem}
.wp-detail{padding:2px 6px 8px}
.wp-detail .ex-list{margin-top:4px}
.workout-done-btn{
  border-radius:999px; padding:8px 16px; font-weight:700; font-size:.88rem;
  background:var(--card); border:1.5px solid var(--accent); color:var(--accent); white-space:nowrap;
}
.workout-done-btn.done{background:var(--accent); color:var(--accent-ink)}
.week-plan{display:flex; flex-direction:column; gap:0}
.wp-row{display:flex; align-items:baseline; gap:10px; padding:7px 6px; border-radius:10px; font-size:.86rem; width:100%; text-align:start; cursor:pointer}
.wp-row:hover{background:var(--chip)}
.wp-row.today-row{background:var(--chip); font-weight:700}
.wp-day{color:var(--muted); width:52px; flex-shrink:0; font-variant-numeric:tabular-nums}
.wp-row.today-row .wp-day{color:var(--accent)}
.no-profile-note{color:var(--muted); font-size:.9rem}
.no-profile-note button{color:var(--accent); font-weight:700; padding:0}

/* ---------- habits ---------- */
.habit{display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line)}
.habit:last-of-type{border-bottom:none}
.habit input[type=checkbox]{
  appearance:none; width:24px; height:24px; border:2px solid var(--line); border-radius:8px;
  background:var(--card); cursor:pointer; flex-shrink:0; display:grid; place-items:center; margin:0; padding:0;
}
.habit input[type=checkbox]:checked{background:var(--accent); border-color:var(--accent)}
.habit input[type=checkbox]:checked::after{content:'✓'; color:var(--accent-ink); font-size:.95rem; font-weight:700}
.habit label{flex:1; cursor:pointer}
.habit.done label{color:var(--muted); text-decoration:line-through}
.habit-del{color:var(--muted); padding:4px 8px; font-size:1rem; visibility:hidden}
.habit:hover .habit-del{visibility:visible}
@media (hover:none){.habit-del{visibility:visible}}
.habit-add-row{display:flex; gap:8px; margin-top:10px}
.habit-add-row input{flex:1}
.btn{
  background:linear-gradient(135deg, #35D9A4, #1E9C74); color:#05261B; font-weight:700;
  border-radius:12px; padding:10px 20px;
  box-shadow:0 2px 12px rgba(61,232,176,.25);
}
.btn.ghost{background:var(--chip); color:var(--ink); font-weight:600}
.btn:disabled{opacity:.45; cursor:default}

/* ---------- journal ---------- */
.moods{display:flex; gap:8px; margin-bottom:12px}
.mood-btn{
  font-size:1.5rem; width:46px; height:46px; border-radius:13px; background:var(--chip);
  display:grid; place-items:center; filter:grayscale(1); opacity:.65; transition:transform .15s;
}
.mood-btn.sel{
  filter:none; opacity:1; background:var(--violet-soft); transform:scale(1.08);
  outline:1.5px solid var(--violet);
}
textarea.journal{width:100%; min-height:110px; resize:vertical; line-height:1.6}
.save-note{font-size:.75rem; color:var(--muted); margin-top:6px; min-height:1em}

/* ---------- week chart ---------- */
.week{display:flex; align-items:flex-end; gap:8px; height:110px; padding-top:8px}
.week .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end}
.week .bar{width:100%; max-width:36px; border-radius:7px 7px 0 0; background:var(--accent-soft); min-height:3px}
.week .bar.filled{background:linear-gradient(180deg, var(--accent), #17654B)}
.week .bar.over{background:linear-gradient(180deg, var(--warn), #8A3B1F)}
.week .bar.today-bar{outline:2px solid var(--accent); outline-offset:2px}
.week .lbl{font-size:.72rem; color:var(--muted)}
.week .val{font-size:.68rem; color:var(--muted); font-variant-numeric:tabular-nums}
.goal-line-note{font-size:.75rem; color:var(--muted); margin-top:8px}
.routine-week-wrap{margin-top:16px; padding-top:14px; border-top:1px solid var(--line)}
.routine-week-wrap.empty{display:none}
.routine-week-title{font-size:.82rem; font-weight:700; color:var(--muted); margin-bottom:6px}
.week .bar.rt-full{background:linear-gradient(180deg, var(--accent), #17654B)}
.week .bar.rt-part{background:var(--accent-soft)}

/* ---------- progress ---------- */
.prog-chart{direction:ltr}
.prog-chart svg{width:100%; height:auto; display:block}
.prog-empty{color:var(--muted); font-size:.88rem; padding:10px 0}
.routine-meter{display:flex; align-items:center; gap:14px; margin-bottom:14px}
.routine-meter.empty{display:none}
.routine-ring{position:relative; width:74px; height:74px; flex:none}
.routine-ring svg{transform:rotate(-90deg)}
.routine-ring .rm-pct{
  position:absolute; inset:0; display:grid; place-items:center;
  font-size:1rem; font-weight:800; color:var(--ink);
}
.routine-msg{font-size:.92rem; line-height:1.45}
.routine-msg .rm-count{color:var(--muted); font-size:.82rem}
.routine-msg.done .rm-title{color:var(--accent)}
.jhist{display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto; padding:2px}
.jhist-row{
  display:block; width:100%; text-align:right; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:10px 12px; color:var(--ink); cursor:pointer;
}
.jhist-row:hover{border-color:var(--accent)}
.jhist-row.cur{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent)}
.jhist-head{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px}
.jhist-date{font-size:.78rem; font-weight:700; color:var(--muted)}
.jhist-mood{font-size:1.1rem; line-height:1}
.jhist-text{font-size:.9rem; line-height:1.5; white-space:pre-wrap; word-break:break-word}
.jhist-nomood{color:var(--muted); font-style:italic}
.weight-update{display:flex; gap:8px; margin-top:12px}
.weight-update input{flex:1}
.streak-chip{background:linear-gradient(135deg, rgba(255,138,92,.18), rgba(255,196,107,.1)) !important}

/* ---------- modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(12,18,13,.55); z-index:50;
  display:flex; align-items:flex-end; justify-content:center;
}

.sheet{
  direction:rtl; background:var(--card); width:100%; max-width:560px; max-height:92vh; overflow-y:auto;

}

.sheet-close{position:sticky; float:left; top:0; font-size:1.4rem; color:var(--muted); padding:2px 8px}
.chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
.chip{
  padding:7px 14px; border-radius:999px; background:var(--chip); font-size:.88rem; font-weight:600;

.chip.sel{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
.photo-row{display:flex; align-items:center; gap:12px; margin-bottom:14px}
.photo-preview{width:74px; height:74px; border-radius:14px; object-fit:cover; border:1px solid var(--line); background:var(--chip)}
.photo-btn{

.search-box{position:relative; margin-bottom:6px}
.search-box input{width:100%}
.results{border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:12px; max-height:250px; overflow-y:auto}

.kcal-out input{width:92px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums}
.accuracy-tip{font-size:.78rem; color:var(--muted); margin:10px 0 14px}
.sheet .actions{display:flex; gap:10px; justify-content:flex-start}
.manual-link{color:var(--accent); font-weight:600; font-size:.88rem; padding:6px 0; text-align:start}
.photo-full{max-width:100%; max-height:80vh; border-radius:14px; display:block; margin:0 auto}

/* profile form */
.pf-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; margin-bottom:14px}
.pf-field{display:flex; flex-direction:column; gap:4px}

.manual-goal-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:.9rem}
.manual-goal-row input[type=number]{width:100px; text-align:center}

/* ---------- toast & tools ---------- */
#toast{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:99;
  background:var(--ink); color:var(--bg); padding:10px 20px; border-radius:999px;
  font-size:.9rem; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .25s;

.tools{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px}
.tools button, .tools label{

.tools label:hover, .tools button:hover{color:var(--accent)}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important}
}

/* sandboxed iframes block confirm()/alert(), so deletes use a two-tap
   pattern and messages go through a toast */
let toastTimer=null;
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}
function twoTap(btn,label,action){
  if(btn.dataset.arm){action();return;}
  btn.dataset.arm='1'; btn.classList.add('confirming'); btn.textContent=label;
  setTimeout(()=>{if(btn.isConnected){delete btn.dataset.arm;btn.classList.remove('confirming');btn.textContent='✕';}},3000);
}

/* ================= state ================= */
let state=load();
function load(){
  let s=null;
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){const p=JSON.parse(raw); if(p&&p.days)s=p;}
  }catch(e){}
  if(!s)s={goal:2000, habits:DEFAULT_HABITS.map((n,i)=>({id:'h'+i,name:n})), days:{}};
  if(!('profile' in s))s.profile=null;
  if(!Array.isArray(s.weightLog))s.weightLog=[];
  return s;
}
function save(){
  state.updatedAt=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}
  catch(e){toast('אין מקום לשמירה — מחקו ימים ישנים עם תמונות או גבו ונקו');}
  queueSync();
}
function dayData(d){
  if(!state.days[d]) state.days[d]={journal:'',mood:null,checks:{},meals:[]};
  return state.days[d];
}

/* ================= profile math ================= */
function computeTargets(p){
  // Mifflin-St Jeor
  const bmr=Math.round(10*p.weight+6.25*p.height-5*p.age+(p.sex==='m'?5:-161));
  const tdee=Math.round(bmr*p.activity);
  let target=tdee+GOALS[p.goalType].adj;
  target=Math.max(1200,Math.round(target/10)*10);
  return {bmr,tdee,target};
}
function bmiOf(p){
  const h=p.height/100;
  return p.weight/(h*h);
}
function bmiLabel(b){
  if(b<18.5)return 'תת־משקל';
  if(b<25)return 'תקין';
  if(b<30)return 'עודף משקל';
  return 'השמנה';
}
function applyProfileGoal(){
  if(state.profile&&!state.profile.manualGoal)
    state.goal=computeTargets(state.profile).target;
  else if(state.profile&&state.profile.manualGoal)
    state.goal=state.profile.manualGoalVal||state.goal;
}

function fmt(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
let current=fmt(new Date());
const todayStr=()=>fmt(new Date());
function shiftDay(n){const d=new Date(current+'T12:00:00');d.setDate(d.getDate()+n);current=fmt(d);render();}

const $=id=>document.getElementById(id);

function render(){
  const d=new Date(current+'T12:00:00');
  const isToday=current===todayStr();
  $('dateTitle').textContent=new Intl.DateTimeFormat('he-IL',{weekday:'long',day:'numeric',month:'long'}).format(d);
  $('dateSub').textContent=(isToday?'היום · ':'')+new Intl.DateTimeFormat('he-IL',{year:'numeric',month:'2-digit',day:'2-digit'}).format(d);
  $('goToday').disabled=isToday;
  $('nextDay').style.visibility=isToday?'hidden':'visible';
  const dp=$('datePick'); if(dp){dp.value=current; dp.max=todayStr();}
  renderSummary(); renderMeals(); renderWorkout(); renderHabits(); renderJournal(); renderWeek(); renderProgress();
}

/* ================= streaks ================= */
function isActiveDay(k){
  const dd=state.days[k]; if(!dd)return false;
  return dd.meals.length>0||!!dd.journal||Object.keys(dd.checks).length>0||!!dd.workoutDone||dd.mood!=null;
}
function calcStreaks(){
  let cur=0; const d=new Date();
  if(!isActiveDay(fmt(d)))d.setDate(d.getDate()-1); // today not logged yet doesn't break the streak
  while(isActiveDay(fmt(d))){cur++;d.setDate(d.getDate()-1);}
  const days=Object.keys(state.days).filter(isActiveDay).sort();
  let best=0,run=0,prev=null;
  for(const k of days){
    if(prev){
      const diff=Math.round((new Date(k+'T12:00:00')-new Date(prev+'T12:00:00'))/86400000);
      run=diff===1?run+1:1;
    }else run=1;
    if(run>best)best=run;
    prev=k;
  }
  return {cur,best:Math.max(best,cur)};
}

function dayKcal(d){
  const dd=state.days[d]; if(!dd)return 0;
  return dd.meals.reduce((s,m)=>s+m.kcal,0);
}

function renderSummary(){
  const total=Math.round(dayKcal(current));
  const goal=state.goal;
  $('ringNum').textContent=total.toLocaleString('he-IL');
  const C=2*Math.PI*58, frac=Math.min(total/goal,1);
  const ring=$('ringFg');
  ring.setAttribute('stroke-dasharray',C);
  ring.setAttribute('stroke-dashoffset',C*(1-frac));
  ring.classList.toggle('over',total>goal);

  const chips=$('heroChips'); chips.innerHTML='';
  const remain=goal-total;
  const mk=(html,warn)=>{const s=document.createElement('span');s.className='hchip'+(warn?' warn-chip':'');s.innerHTML=html;chips.appendChild(s);};
  mk('🎯 יעד <b>'+goal.toLocaleString('he-IL')+'</b> קק"ל');
  if(remain>=0)mk('🔥 נותרו <b>'+remain.toLocaleString('he-IL')+'</b>');
  else mk('⚠️ חריגה <b>'+Math.abs(remain).toLocaleString('he-IL')+'</b>',true);
  const p=state.profile;
  if(p){
    const bmi=bmiOf(p);
    mk('⚖️ <b>'+p.weight+'</b> ק"ג');
    mk('BMI <b>'+bmi.toFixed(1)+'</b> · '+bmiLabel(bmi));
    const eb=document.createElement('button');eb.className='hchip';eb.innerHTML='✏️ עריכת פרופיל';
    eb.onclick=openProfileModal;chips.appendChild(eb);
  }else{
    const b=document.createElement('button');b.className='setup-cta';
    b.textContent='✨ הגדרת פרופיל אישי — חישוב קלוריות ואימונים בשבילך';
    b.onclick=openProfileModal;chips.appendChild(b);
  }
  const st=calcStreaks();
  if(st.cur>0){
    const sc=document.createElement('span');sc.className='hchip streak-chip';

function renderHabits(){
  const dd=dayData(current), box=$('habitsContainer');
  box.innerHTML='';
  let done=0;
  for(const h of state.habits){
    const checked=!!dd.checks[h.id]; if(checked)done++;
    const row=document.createElement('div'); row.className='habit'+(checked?' done':'');
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=checked; cb.id='cb-'+h.id;
    cb.onchange=()=>{dd.checks[h.id]=cb.checked; if(!cb.checked)delete dd.checks[h.id]; save(); renderHabits();};
    const lb=document.createElement('label'); lb.htmlFor='cb-'+h.id; lb.textContent=h.name;
    const del=document.createElement('button'); del.className='habit-del'; del.textContent='✕'; del.title='הסרת ההרגל';
    del.onclick=()=>twoTap(del,'להסיר?',()=>{
      state.habits=state.habits.filter(x=>x.id!==h.id); save(); renderHabits();
      toast('ההרגל "'+h.name+'" הוסר');
    });
    row.append(cb,lb,del); box.appendChild(row);
  }
  if(!state.habits.length){box.innerHTML='<div class="empty-meal">אין הרגלים עדיין — הוסיפו אחד למטה</div>';}
  $('habitsProgress').textContent=state.habits.length?done+' / '+state.habits.length+' הושלמו':'';
  renderRoutineMeter(done,state.habits.length);
  renderRoutineWeek();
}

function habitDoneCount(k){
  const dd=state.days[k]; if(!dd||!dd.checks)return 0;
  return state.habits.reduce((n,h)=>n+(dd.checks[h.id]?1:0),0);
}

function renderRoutineWeek(){
  const wrap=$('routineWeekWrap'), box=$('routineWeek'), note=$('routineWeekNote');
  const total=state.habits.length;
  if(!total){wrap.className='routine-week-wrap empty'; return;}
  wrap.className='routine-week-wrap';
  box.innerHTML='';
  const days=[]; const base=new Date(current+'T12:00:00');
  for(let i=6;i>=0;i--){const d=new Date(base);d.setDate(d.getDate()-i);days.push(d);}
  const letters=['א','ב','ג','ד','ה','ו','ש'];
  let fullDays=0;
  days.forEach(d=>{
    const k=fmt(d), done=habitDoneCount(k), pct=Math.round(done/total*100);
    if(done===total)fullDays++;
    const col=document.createElement('div'); col.className='col';
    const val=document.createElement('div'); val.className='val'; val.textContent=done?pct+'%':'';
    const bar=document.createElement('div');
    bar.className='bar'+(done===total?' rt-full':(done?' rt-part':''));
    if(k===current)bar.classList.add('today-bar');
    bar.style.height=Math.max(3,Math.round(pct/100*72))+'px';
    bar.title=new Intl.DateTimeFormat('he-IL',{day:'numeric',month:'numeric'}).format(d)+' — '+done+'/'+total+' הרגלים';
    const lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=letters[d.getDay()];
    col.append(val,bar,lbl); box.appendChild(col);
  });
  note.textContent='ימים ירוקים = השלמת את כל השגרה · השלמת הכל ב‑'+fullDays+' מתוך 7 הימים';
}

function renderRoutineMeter(done,total){
  const box=$('routineMeter');
  if(!total){box.className='routine-meter empty'; box.innerHTML=''; return;}
  box.className='routine-meter';
  const pct=Math.round(done/total*100);
  const all=done===total;
  const r=32, C=2*Math.PI*r, off=C*(1-done/total);
  const col=all?'var(--accent)':'var(--accent)';
  const ring='<div class="routine-ring"><svg viewBox="0 0 74 74" width="74" height="74">'+
    '<circle cx="37" cy="37" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="7"/>'+
    '<circle cx="37" cy="37" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="7" stroke-linecap="round"'+
    ' stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"'+
    (all?' style="filter:drop-shadow(0 0 5px rgba(61,232,176,.6))"':'')+'/></svg>'+
    '<div class="rm-pct">'+pct+'%</div></div>';
  let title,sub;
  if(all){title='כל הכבוד! השלמת את כל השגרה היומית 🎉'; sub=done+' מתוך '+total+' הרגלים';}
  else{const left=total-done; title=done===0?'עדיין לא התחלת את השגרה של היום':'עוד '+left+' ל'+'השלמת השגרה'; sub=done+' מתוך '+total+' הרגלים הושלמו';}
  box.innerHTML=ring+'<div class="routine-msg'+(all?' done':'')+'"><div class="rm-title">'+title+'</div><div class="rm-count">'+sub+'</div></div>';
}

function renderJournalHistory(){

    .filter(k=>{const d=state.days[k]; return (d.journal&&d.journal.trim())||d.mood!=null;})
    .sort((a,b)=>a<b?1:-1);
  if(!entries.length){
    box.innerHTML='<div class="prog-empty">עדיין לא כתבת ביומן — כל רשומה שתכתוב תופיע כאן כדי לראות את המסע שלך לאורך הזמן</div>';
    note.textContent=''; return;
  }
  let html='<div class="jhist">';
  entries.forEach(k=>{
    const d=state.days[k];
    const mood=d.mood!=null?MOODS[d.mood]:'';
    const txt=d.journal&&d.journal.trim()?d.journal.trim():'<span class="jhist-nomood">(מצב רוח בלבד)</span>';
    const isCur=k===current;
    html+='<button class="jhist-row'+(isCur?' cur':'')+'" data-day="'+k+'">'+
      '<div class="jhist-head"><span class="jhist-date">'+heDate(k)+'</span>'+

function renderWeightChart(){
  const box=$('progChart'), note=$('progNote');
  const map=new Map();
  [...state.weightLog].sort((a,b)=>a.d<b.d?-1:1).forEach(e=>map.set(e.d,e.w));
  const pts=[...map.entries()].map(([d,w])=>({d,w}));
  if(pts.length<2){
    box.innerHTML='<div class="prog-empty">עדכנו את המשקל לפחות פעמיים (בימים שונים) כדי לראות את הגרף — אפשר כאן למטה 👇</div>';
    note.textContent=pts.length===1?'נקודה ראשונה נרשמה: '+pts[0].w+' ק"ג ב‑'+heDate(pts[0].d):'';
    return;
  }
  const W=560,H=190,PL=38,PR=14,PT=14,PB=26;
  const t0=new Date(pts[0].d+'T12:00:00').getTime(), t1=new Date(pts[pts.length-1].d+'T12:00:00').getTime();
  const ws=pts.map(p=>p.w);
  const lo=Math.min(...ws)-0.5, hi=Math.max(...ws)+0.5;
  const X=t=>PL+(t1===t0?0.5:(t-t0)/(t1-t0))*(W-PL-PR);
  const Y=w=>H-PB-(w-lo)/(hi-lo)*(H-PT-PB);
  const P=pts.map(p=>X(new Date(p.d+'T12:00:00').getTime()).toFixed(1)+','+Y(p.w).toFixed(1));
  const line=P.join(' ');
  const area=P.join(' ')+' '+(W-PR)+','+(H-PB)+' '+PL+','+(H-PB);
  let grid='';
  for(let i=0;i<3;i++){
    const w=lo+(hi-lo)*(i+1)/4, y=Y(w).toFixed(1);
    grid+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="var(--line)" stroke-dasharray="3 4"/>'+
      '<text x="'+(PL-6)+'" y="'+(+y+3)+'" text-anchor="end" font-size="10" fill="var(--muted)">'+w.toFixed(1)+'</text>';
  }
  const dots=pts.map(p=>'<circle cx="'+X(new Date(p.d+'T12:00:00').getTime()).toFixed(1)+'" cy="'+Y(p.w).toFixed(1)+'" r="3.5" fill="var(--accent)"/>').join('');
  box.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+grid+
    '<polygon points="'+area+'" fill="rgba(61,232,176,.12)"/>'+
    '<polyline points="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" style="filter:drop-shadow(0 0 5px rgba(61,232,176,.45))"/>'+dots+
    '<text x="'+PL+'" y="'+(H-8)+'" font-size="10" fill="var(--muted)">'+heDate(pts[0].d)+'</text>'+
    '<text x="'+(W-PR)+'" y="'+(H-8)+'" text-anchor="end" font-size="10" fill="var(--muted)">'+heDate(pts[pts.length-1].d)+'</text>'+
    '</svg>';
  const diff=pts[pts.length-1].w-pts[0].w;
  note.textContent=diff===0?'המשקל יציב מאז '+heDate(pts[0].d):
    (diff<0?'ירידה של '+Math.abs(diff).toFixed(1):'עלייה של '+diff.toFixed(1))+' ק"ג מאז '+heDate(pts[0].d)+
    ' · משקל נוכחי: '+pts[pts.length-1].w+' ק"ג';
}

function renderCalChart(){
  const box=$('progChart'), note=$('progNote');
  const days=[]; const base=new Date();
  for(let i=29;i>=0;i--){const d=new Date(base);d.setDate(d.getDate()-i);days.push(fmt(d));}
  const vals=days.map(k=>Math.round(dayKcal(k)));
  const withData=vals.filter(v=>v>0);
  if(!withData.length){
    box.innerHTML='<div class="prog-empty">עדיין אין רישומי ארוחות — הגרף יתמלא ככל שתתעדו</div>';
    note.textContent=''; return;
  }
  const W=560,H=190,PL=38,PR=14,PT=14,PB=26;
  const hi=Math.max(state.goal,...vals)*1.05;
  const bw=(W-PL-PR)/30;
  const Y=v=>H-PB-(v/hi)*(H-PT-PB);
  let bars='';
  vals.forEach((v,i)=>{
    if(!v)return;
    const x=(PL+i*bw+1).toFixed(1), y=Y(v).toFixed(1), h=(H-PB-Y(v)).toFixed(1);
    bars+='<rect x="'+x+'" y="'+y+'" width="'+Math.max(2,bw-2).toFixed(1)+'" height="'+h+'" rx="2" fill="'+(v>state.goal?'var(--warn)':'var(--accent)')+'" opacity=".9"/>';
  });
  const gy=Y(state.goal).toFixed(1);
  box.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+bars+
    '<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="var(--muted)" stroke-dasharray="5 4"/>'+
    '<text x="'+(PL-6)+'" y="'+(+gy+3)+'" text-anchor="end" font-size="10" fill="var(--muted)">'+state.goal+'</text>'+
    '<text x="'+PL+'" y="'+(H-8)+'" font-size="10" fill="var(--muted)">'+heDate(days[0])+'</text>'+
    '<text x="'+(W-PR)+'" y="'+(H-8)+'" text-anchor="end" font-size="10" fill="var(--muted)">'+heDate(days[29])+'</text>'+
    '</svg>';
  const avg=Math.round(withData.reduce((s,v)=>s+v,0)/withData.length);
  note.textContent='ממוצע בימים שתועדו: '+avg.toLocaleString('he-IL')+' קק"ל · הקו המקווקו = היעד ('+state.goal.toLocaleString('he-IL')+')';
}

/* ================= cloud sync (GitHub private repo) ================= */
const SYNC_REPO='shonstarosta54-collab/yoman-data', SYNC_PATH='data.json', SKEY='shigra-sync-v1';
let sync=null; try{sync=JSON.parse(localStorage.getItem(SKEY));}catch(e){}
function saveSyncCfg(){if(sync)localStorage.setItem(SKEY,JSON.stringify(sync));else localStorage.removeItem(SKEY);}
function setSyncStatus(s){
  const b=$('syncBtn'); if(!b)return;
  if(!sync){b.textContent='☁️ סנכרון בין מכשירים';return;}
  b.textContent=s==='...'?'☁️ מסנכרן…':(s==='err'?'☁️ שגיאת סנכרון — לחצו לניסיון חוזר':'☁️ מסונכרן ✓');
}
function b64enc(str){
  const b=new TextEncoder().encode(str); let s='';
  for(let i=0;i<b.length;i+=0x8000)s+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000));
  return btoa(s);
}
function gh(path,opt){
  opt=opt||{};
  opt.headers=Object.assign({'Authorization':'Bearer '+sync.token,'Accept':'application/vnd.github+json'},opt.headers||{});
  return fetch('https://api.github.com'+path,opt);
}
async function fetchRemote(){
  const r=await gh('/repos/'+SYNC_REPO+'/contents/'+SYNC_PATH,{headers:{'Accept':'application/vnd.github.raw'}});
  if(r.status===404)return{data:null,sha:null};
  if(!r.ok)throw new Error('fetch '+r.status);
  const data=JSON.parse(await r.text());
  let sha=null;
  const t=await gh('/repos/'+SYNC_REPO+'/git/trees/main');
  if(t.ok){const j=await t.json();const f=(j.tree||[]).find(x=>x.path===SYNC_PATH);if(f)sha=f.sha;}
  return{data,sha};
}
function ensureShape(s){
  if(!('profile' in s))s.profile=null;
  if(!Array.isArray(s.weightLog))s.weightLog=[];
  if(!s.habits)s.habits=[];
  if(!s.days)s.days={};
  if(!s.goal)s.goal=2000;
  return s;
}
let syncTimer=null, syncBusy=false, lastPull=0;
function queueSync(){
  if(!sync)return;
  clearTimeout(syncTimer); setSyncStatus('...');
  syncTimer=setTimeout(()=>pushSync(false),2500);
}
async function pushSync(isRetry){
  if(!sync||syncBusy)return; syncBusy=true;
  try{
    const body={message:'sync',content:b64enc(JSON.stringify(state))};
    if(sync.sha)body.sha=sync.sha;
    const r=await gh('/repos/'+SYNC_REPO+'/contents/'+SYNC_PATH,{method:'PUT',body:JSON.stringify(body)});
    if(r.status===409||r.status===422){
      const rem=await fetchRemote();
      sync.sha=rem.sha; saveSyncCfg();
      if(rem.data&&(rem.data.updatedAt||0)>(state.updatedAt||0)){
        state=ensureShape(rem.data);
        localStorage.setItem(KEY,JSON.stringify(state));
        render(); setSyncStatus('ok');
      }else if(!isRetry){syncBusy=false; return pushSync(true);}
      else throw 0;
    }else if(r.ok){
      const j=await r.json(); sync.sha=j.content.sha; sync.last=Date.now(); saveSyncCfg(); setSyncStatus('ok');
    }else throw 0;
  }catch(e){setSyncStatus('err');}
  syncBusy=false;
}
async function pullSync(force){
  if(!sync||syncBusy)return;
  if(!force&&Date.now()-lastPull<30000)return;
  lastPull=Date.now(); syncBusy=true;
  try{
    setSyncStatus('...');
    const rem=await fetchRemote();
    sync.sha=rem.sha; saveSyncCfg();
    if(rem.data&&(rem.data.updatedAt||0)>(state.updatedAt||0)){
      state=ensureShape(rem.data);
      localStorage.setItem(KEY,JSON.stringify(state));
      render(); toast('עודכן מהענן ✓');
      setSyncStatus('ok');
    }else if((state.updatedAt||0)>((rem.data&&rem.data.updatedAt)||0)){
      syncBusy=false; return pushSync(false);
    }else setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
  syncBusy=false;
}

  }else{
    $('syncCancel').onclick=()=>ov.remove();
    $('syncConnect').onclick=async()=>{
      const tk=$('syncToken').value.trim();
      if(!tk){toast('הדביקו קודם את המפתח');return;}
      $('syncConnect').disabled=true; $('syncConnect').textContent='בודק…';
      sync={token:tk,sha:null,last:null};
      try{
        const r=await gh('/repos/'+SYNC_REPO);
        if(!r.ok)throw 0;
        saveSyncCfg(); ov.remove(); setSyncStatus('...');
        toast('מחובר! מסנכרן…'); pullSync(true);
      }catch(e){
        sync=null;
        $('syncConnect').disabled=false; $('syncConnect').textContent='התחברות';
        toast('המפתח לא תקין או שאין גישה — בדקו שהעתקתם את כולו');
      }
    };
  }
}
$('syncBtn').onclick=()=>{
  if(sync&&$('syncBtn').textContent.includes('שגיאת'))pullSync(true);
  else openSyncModal();
};
window.addEventListener('focus',()=>pullSync(false));

/* ================= welcome screen =================
   shown once per app session (sessionStorage): reappears every time the
   app is fully closed and reopened, not on every reload within one visit */
const WELCOME_SESSION_KEY='shigra-welcomed-session';
const WELCOME_ART=`<svg class="welcome-art" viewBox="0 0 260 190" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="jRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E9C74"/><stop offset="1" stop-color="#3DE8B0"/>
    </linearGradient>
  </defs>
  <circle cx="130" cy="95" r="68" fill="none" stroke="#20262f" stroke-width="16"/>
  <circle cx="130" cy="95" r="68" fill="none" stroke="url(#jRing)" stroke-width="16" stroke-linecap="round"
    stroke-dasharray="320 427" transform="rotate(-90 130 95)" style="filter:drop-shadow(0 0 14px rgba(61,232,176,.5))"/>
  <path d="M104 96 L120 112 L156 70" fill="none" stroke="#EDF2F0" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="205" cy="34" r="3.2" fill="#8B7CFF"/>
  <circle cx="52" cy="146" r="2.6" fill="#3DE8B0" opacity=".75"/>
  <circle cx="222" cy="128" r="2.2" fill="#8B7CFF" opacity=".6"/>
</svg>`;
function showWelcome(){
  const ov=document.createElement('div'); ov.className='welcome-overlay';
  const card=document.createElement('div'); card.className='welcome-card';
  card.innerHTML=WELCOME_ART+
    '<div class="welcome-title">היי! ברוכים הבאים ליומן שלכם</div>'+
    '<div class="welcome-sub">מקום אחד לתעד ארוחות, אימונים, הרגלים ואיך עבר היום — ולראות את ההתקדמות שלכם לאורך זמן.</div>'+
    '<div class="welcome-actions"><button class="btn" id="wStart">בואו נתחיל</button></div>';
  ov.appendChild(card); document.body.appendChild(ov);
  card.querySelector('#wStart').onclick=()=>{sessionStorage.setItem(WELCOME_SESSION_KEY,'1'); ov.remove();};
}

render();
setSyncStatus('ok');
pullSync(true);
if(!sessionStorage.getItem(WELCOME_SESSION_KEY)){sessionStorage.setItem(WELCOME_SESSION_KEY,'1'); showWelcome();}
</script>
